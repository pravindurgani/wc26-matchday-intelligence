name: Matchday intelligence (slow cadence)

# Runs every 3 hours during the tournament window.
#
# This is the SLOW companion to live-matchday.yml (which fires every 10 min
# for results + simulator). The matchday-intel layers don't change minute-
# to-minute:
#   - injuries: API-Football publishes daily-ish at best
#   - weather: Open-Meteo updates hourly but forecasts move slowly
#   - lineups: confirmed XI lands ~60 min before kickoff; a 3h cadence still
#     catches every kickoff (we widen the window to --hours-ahead 4)
#   - stats proxy: post-match, never changes after FT
#
# Polling all four hourly would waste ~99% of the API-Football daily budget
# on no-ops. 3h cadence = ~8 ticks/day × 4 endpoint calls + per-fixture
# fan-out ≈ 30-200 calls/day depending on schedule density. Comfortably
# inside the 7,500/day Pro-plan ceiling.
on:
  # Window-scoped 3h cron. Tournament-only — outside this range every fetch
  # is wasted API budget on dormant teams.
  schedule:
    - cron: '0 */3 11-30 6 *'    # group stage: 11–30 Jun, every 3h
    - cron: '0 */3 1-19 7 *'     # knockouts:   1–19 Jul, every 3h
  workflow_dispatch:
    inputs:
      hours_ahead:
        description: 'Lineups window hours-ahead (default 4)'
        required: false
        default: '4'
      dry_run:
        description: 'Dry-run only (no write, no commit)'
        type: boolean
        required: false
        default: false
      skip_injuries:
        description: 'Skip the injuries fetcher this run'
        type: boolean
        required: false
        default: false

# Separate concurrency group from the fast workflow so they can interleave.
# Cancel in-progress slow runs if a new slow run starts — the latest snapshot
# wins, no point holding up the queue with a stale fetch.
concurrency:
  group: wc26-matchday-intel-slow
  cancel-in-progress: true

permissions:
  contents: write

# Determinism: pin hash ordering so warning aggregation order stays stable
# across runs. Defense-in-depth — fetchers don't iterate sets in hot loops,
# but log/log_jsonl diffs become reproducible.
env:
  PYTHONHASHSEED: '0'

jobs:
  matchday-intel:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Date gate (skip if outside tournament window)
        id: gate
        run: |
          # Manual dispatches always run — used for pre-tournament smoke tests.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Manual dispatch — bypassing date gate."
            exit 0
          fi
          NOW=$(date -u +%s)
          # Start 24h early so the first kickoff is already covered by an active loop.
          START=$(date -u -d '2026-06-10 00:00:00' +%s 2>/dev/null || python -c "import datetime;print(int(datetime.datetime(2026,6,10).timestamp()))")
          END=$(date -u -d '2026-07-20 00:00:00' +%s 2>/dev/null || python -c "import datetime;print(int(datetime.datetime(2026,7,20).timestamp()))")
          if [ $NOW -lt $START ] || [ $NOW -gt $END ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Outside tournament window — exiting."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # ── Phase 2/4 prerequisites ───────────────────────────────────────
      # The slow workflow OWNS these three producers — origin/main never
      # writes them otherwise (see Wave-2 S1 finding). Order matters:
      #   1) fetch_results --with-events  → results_2026.json + per-match
      #      `events` lists. suspension_tracker walks those events; without
      #      this step it would emit empty + `no_events_in_snapshot`.
      #   2) fetch_player_stats  → player_stats_2026.json (auto_tier baseline).
      #   3) referee_adjustments → referee_2026.json (reads results).
      #   4) suspension_tracker  → suspensions_2026.json (reads results+events).
      # All three are wrapped in `set +e ... exit 0` so one failing producer
      # cannot block the rest of the tick — the orchestrator's freshness
      # guard will emit a `subsystem_stale` warning if the snapshot is
      # missing or older than 6h (= 2 slow-cron ticks).
      - name: Fetch results with events (refresh for referee + suspensions)
        if: steps.gate.outputs.skip != 'true'
        env:
          # 2026-07-03: FOOTBALL_PROVIDER was missing from this step's env, so
          # fetch_results.get_provider_name() (reads FOOTBALL_PROVIDER, then
          # WC_RESULTS_SOURCE, then defaults to "mock") resolved to "mock" and
          # the 3h event-enrichment fetch was a silent no-op — the key alone
          # never selects the provider. Mirror the fast workflow's provider
          # resolution: repo var FOOTBALL_PROVIDER with WC_RESULTS_SOURCE as
          # the back-compat alias.
          FOOTBALL_PROVIDER: ${{ vars.FOOTBALL_PROVIDER }}
          WC_RESULTS_SOURCE: ${{ vars.WC_RESULTS_SOURCE }}
          API_FOOTBALL_KEY:  ${{ secrets.API_FOOTBALL_KEY }}
          WC_APIFOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set +e
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            python scripts/live/fetch_results.py --dry-run --with-events
          else
            python scripts/live/fetch_results.py --with-events
          fi
          exit 0

      - name: Fetch player stats (API-Football /players)
        if: steps.gate.outputs.skip != 'true'
        env:
          API_FOOTBALL_KEY:  ${{ secrets.API_FOOTBALL_KEY }}
          WC_APIFOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          API_FOOTBALL_LEAGUE_ID: ${{ vars.API_FOOTBALL_LEAGUE_ID || '1' }}
          API_FOOTBALL_SEASON: ${{ vars.API_FOOTBALL_SEASON || '2026' }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set +e
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            python scripts/live/fetch_player_stats.py --dry-run
          else
            python scripts/live/fetch_player_stats.py
          fi
          exit 0

      - name: Build referee adjustments (Wave-A baseline join)
        if: steps.gate.outputs.skip != 'true'
        env:
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set +e
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            python scripts/live/referee_adjustments.py --dry-run
          else
            python scripts/live/referee_adjustments.py
          fi
          exit 0

      # R11 C3-old: fetch_injuries now runs BEFORE suspension_tracker. Pre-R11
      # the suspension tracker ran first; suspension_tracker.py does NOT read
      # injuries today (grep confirms zero refs), so this was a LATENT
      # ordering bug — but any future addition of "use injury data to
      # estimate which suspended player's replacement would be available"
      # logic in suspension_tracker would have silently read yesterday's
      # injuries snapshot. Defense-in-depth swap closes the footgun.
      - name: Fetch injuries (API-Football /injuries)
        if: steps.gate.outputs.skip != 'true' && github.event.inputs.skip_injuries != 'true'
        env:
          API_FOOTBALL_KEY:  ${{ secrets.API_FOOTBALL_KEY }}
          WC_APIFOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          # GitHub repo-level vars are empty by default; fetch_injuries.py
          # falls back to provider_fixture_map.json (league=1, season=2026).
          # The fallback works correctly — the `|| '...'` defaults here are
          # purely for workflow-log clarity so the actual values appear in
          # the env dump rather than blank strings that hide the truth.
          API_FOOTBALL_LEAGUE_ID: ${{ vars.API_FOOTBALL_LEAGUE_ID || '1' }}
          API_FOOTBALL_SEASON: ${{ vars.API_FOOTBALL_SEASON || '2026' }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set +e   # one fetcher failing must not block the others
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            python scripts/live/fetch_injuries.py --dry-run
          else
            python scripts/live/fetch_injuries.py
          fi
          exit 0

      - name: Build suspension tracker (reads results + events)
        if: steps.gate.outputs.skip != 'true'
        env:
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set +e
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            python scripts/live/suspension_tracker.py --dry-run
          else
            python scripts/live/suspension_tracker.py
          fi
          exit 0

      - name: Fetch weather (Open-Meteo — no key required)
        if: steps.gate.outputs.skip != 'true'
        env:
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set +e
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            python scripts/live/fetch_weather.py --dry-run
          else
            python scripts/live/fetch_weather.py
          fi
          exit 0

      - name: Fetch lineups (API-Football /fixtures/lineups)
        if: steps.gate.outputs.skip != 'true'
        env:
          API_FOOTBALL_KEY:  ${{ secrets.API_FOOTBALL_KEY }}
          WC_APIFOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          INPUT_HOURS_AHEAD: ${{ github.event.inputs.hours_ahead }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set +e
          HOURS_AHEAD="${INPUT_HOURS_AHEAD:-4}"
          # Defensive validation — dispatch input flows to CLI, must be an int.
          if ! [ "$HOURS_AHEAD" -eq "$HOURS_AHEAD" ] 2>/dev/null; then
            echo "Refusing non-integer hours_ahead: $HOURS_AHEAD" >&2
            exit 1
          fi
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            python scripts/live/fetch_lineups.py --dry-run --hours-ahead "$HOURS_AHEAD"
          else
            python scripts/live/fetch_lineups.py --hours-ahead "$HOURS_AHEAD"
          fi
          exit 0

      - name: Fetch post-match stats proxy (API-Football /fixtures/statistics)
        if: steps.gate.outputs.skip != 'true'
        env:
          API_FOOTBALL_KEY:  ${{ secrets.API_FOOTBALL_KEY }}
          WC_APIFOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set +e
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            python scripts/live/fetch_match_stats.py --dry-run
          else
            python scripts/live/fetch_match_stats.py
          fi
          exit 0

      - name: Consolidate via apply_matchday_adjustments
        if: steps.gate.outputs.skip != 'true'
        env:
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set +e
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            python scripts/live/apply_matchday_adjustments.py --dry-run
          else
            python scripts/live/apply_matchday_adjustments.py
          fi
          exit 0

      - name: Commit updated matchday-intelligence JSON (if changed)
        if: steps.gate.outputs.skip != 'true' && github.event.inputs.dry_run != 'true'
        run: |
          set +e
          git config user.name "wc26-bot"
          git config user.email "wc26-bot@users.noreply.github.com"
          # Explicit allow-list — fetcher snapshots + consolidated dashboard
          # JSON + audit log. The simulator is NOT re-run here; the fast
          # workflow (live-matchday.yml) reads these files on its next tick
          # via the apply_matchday_adjustments integration point in 03_simulate.py.
          # Wave-2 S1: include the Phase 2/4/6 producer outputs so the
          # orchestrator's freshness guard sees real on-origin data instead
          # of silently degrading on every scheduled tick.
          git add data/live/injuries_2026.json \
                  data/live/weather_2026.json \
                  data/live/lineups_2026.json \
                  data/live/match_stats_2026.json \
                  data/live/player_stats_2026.json \
                  data/live/referee_2026.json \
                  data/live/suspensions_2026.json \
                  data/live/matchday_intelligence_log.jsonl \
                  dashboard/matchday_intelligence.json 2>/dev/null
          if git diff --quiet --cached; then
            echo "No matchday-intelligence changes to commit."
            exit 0
          fi
          git commit -m "matchday-intel: refresh @ $(date -u +%Y-%m-%dT%H:%MZ)"
          # Explicit refspec — main is production for this repo.
          BRANCH="main"
          # PUSH-RACE FIX: Mirrors the live-matchday.yml hardened pattern.
          # `--autostash` is defensive-only here (slow workflow doesn't run
          # the simulator so data/processed/ should stay clean), but matches
          # the fast-workflow shape so the two stay symmetrical.
          git pull --rebase --autostash origin "$BRANCH" || echo "Rebase failed — pushing anyway."
          # R4: surface push failures instead of swallowing them with
          # `|| echo ...; exit 0`. Previously the job went green even when
          # the commit never reached origin, silently freezing the matchday
          # intel files (injuries / weather / lineups / referee /
          # suspensions). Recovery is still automatic — next tick re-runs
          # all producers idempotently and re-stages the equivalent commit —
          # but the failure is now visible in the Actions UI so a human
          # watching can investigate a stuck push (auth / branch protection
          # / non-fast-forward storm) instead of trusting a false-green.
          if ! git push origin "HEAD:$BRANCH"; then
            echo "::error::git push to $BRANCH failed — matchday intel not refreshed this tick. Next scheduled tick will retry."
            exit 1
          fi
          exit 0
