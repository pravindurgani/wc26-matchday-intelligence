name: Live matchday refresh

# Polls every 10 minutes during the tournament window (11 Jun → 19 Jul 2026).
# The orchestrator exits fast if no match has changed to a final state —
# only re-simulates when something genuinely happened.
#
# Provider selection:
#   - Set repo VARIABLE `FOOTBALL_PROVIDER` to `api_football` (or leave unset for mock)
#   - Add repo SECRET `API_FOOTBALL_KEY` for API-Football
#   - (Optional) Add repo SECRET `SPORTMONKS_TOKEN` if using Sportmonks
# Without a provider key the orchestrator silently falls back to manual/mock mode.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      provider:
        description: 'Override provider for this manual run (mock|api_football|sportmonks)'
        required: false
        default: ''
      dry_run:
        description: 'Dry-run only (no write, no commit)'
        type: boolean
        required: false
        default: false

concurrency:
  group: wc26-live
  cancel-in-progress: false   # let any in-flight rerun finish

# GITHUB_TOKEN is read-only by default on repos created after 2023.
# We need contents:write so the bot can push the live JSON updates.
permissions:
  contents: write

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Date gate (skip if outside tournament window)
        id: gate
        run: |
          # Manual dispatches always run — used for pre-tournament smoke tests.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Manual dispatch — bypassing date gate."
            exit 0
          fi
          NOW=$(date -u +%s)
          # Start 24h early so the first kickoff is already covered by an active loop.
          START=$(date -u -d '2026-06-10 00:00:00' +%s 2>/dev/null || python -c "import datetime;print(int(datetime.datetime(2026,6,10).timestamp()))")
          END=$(date -u -d '2026-07-20 00:00:00' +%s 2>/dev/null || python -c "import datetime;print(int(datetime.datetime(2026,7,20).timestamp()))")
          if [ $NOW -lt $START ] || [ $NOW -gt $END ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Outside tournament window — exiting."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Resolve provider for this run
        id: provider
        run: |
          PROVIDER="${{ github.event.inputs.provider }}"
          if [ -z "$PROVIDER" ]; then
            PROVIDER="${{ vars.FOOTBALL_PROVIDER }}"
          fi
          if [ -z "$PROVIDER" ]; then
            PROVIDER="${{ vars.WC_RESULTS_SOURCE }}"
          fi
          if [ -z "$PROVIDER" ]; then
            PROVIDER="mock"
          fi
          echo "provider=$PROVIDER" >> $GITHUB_OUTPUT
          echo "Provider for this run: $PROVIDER"

      - name: Rebuild fixture map if provider changed
        if: steps.gate.outputs.skip != 'true'
        env:
          API_FOOTBALL_KEY:  ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: |
          set +e
          PROVIDER="${{ steps.provider.outputs.provider }}"
          MAP=data/live/provider_fixture_map.json
          # Compare the provider baked into the existing map vs the requested one.
          # jq is preinstalled on ubuntu-latest; -r prints raw value, // '' = default if missing.
          CURRENT=$(jq -r '.provider // ""' "$MAP" 2>/dev/null || echo "")
          if [ "$CURRENT" = "$PROVIDER" ]; then
            echo "Fixture map already targets $PROVIDER — skipping rebuild."
            exit 0
          fi
          echo "Fixture map provider mismatch: have='$CURRENT' want='$PROVIDER' — rebuilding."
          # Back up the current map so we can roll back if the rebuild yields too few fixtures.
          if [ -f "$MAP" ]; then cp "$MAP" "${MAP}.bak"; fi
          python scripts/live/build_provider_fixture_map.py \
            --provider "$PROVIDER" --season 2026 --league-id 1 --write
          RC=$?
          if [ $RC -ne 0 ] && [ -f "${MAP}.bak" ]; then
            echo "Rebuild failed — restoring previous fixture map."
            mv "${MAP}.bak" "$MAP"
          else
            rm -f "${MAP}.bak"
          fi
          exit 0

      - name: Run live update orchestrator
        if: steps.gate.outputs.skip != 'true'
        env:
          FOOTBALL_PROVIDER: ${{ steps.provider.outputs.provider }}
          # Backward-compatible alias — orchestrator reads either name
          WC_RESULTS_SOURCE: ${{ steps.provider.outputs.provider }}
          API_FOOTBALL_KEY:  ${{ secrets.API_FOOTBALL_KEY }}
          WC_APIFOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          WC_FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          SPORTMONKS_TOKEN: ${{ secrets.SPORTMONKS_TOKEN }}
          WC_SPORTMONKS_TOKEN: ${{ secrets.SPORTMONKS_TOKEN }}
          API_FOOTBALL_LEAGUE_ID: ${{ vars.API_FOOTBALL_LEAGUE_ID }}
          API_FOOTBALL_SEASON: ${{ vars.API_FOOTBALL_SEASON }}
          FOOTBALL_DATA_COMPETITION: ${{ vars.FOOTBALL_DATA_COMPETITION }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python scripts/live/run_live_update.py --dry-run
          else
            python scripts/live/run_live_update.py
          fi

      - name: Commit updated JSON (if changed)
        if: steps.gate.outputs.skip != 'true' && github.event.inputs.dry_run != 'true'
        run: |
          set +e   # never let a non-zero exit here fail the whole tick
          git config user.name "wc26-bot"
          git config user.email "wc26-bot@users.noreply.github.com"
          # Explicit allow-list — skip gitignored files (circuit_breaker_state.json, etc.)
          git add dashboard/predictions.json \
                  dashboard/predictions_live.json \
                  dashboard/live_state.json \
                  dashboard/live_delta.json \
                  data/live/results_2026.json \
                  data/live/live_team_state.json \
                  data/live/provider_fixture_map.json 2>/dev/null
          if git diff --quiet --cached; then
            echo "No JSON changes to commit."
            exit 0
          fi
          # NO `[skip ci]` tag — Vercel treats it as "do not deploy", which is
          # the opposite of what we want. We need each live update to trigger
          # a Vercel rebuild so vercel.app serves the fresh JSON. The only
          # other workflow (daily-baseline.yml) is schedule-only, so there's
          # nothing here for `[skip ci]` to usefully skip.
          git commit -m "live: update results @ $(date -u +%Y-%m-%dT%H:%MZ)"
          git push || echo "Push failed — will retry next tick."
          exit 0

      # Optional: trigger Vercel rebuild explicitly via deploy hook
      # - run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
