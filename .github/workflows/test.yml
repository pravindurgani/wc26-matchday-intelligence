name: Test + pre-flight

# Run the local 273-test suite + 217-check pre-flight on every push to main
# AND on every PR targeting main. Before this workflow existed, the gate
# was human-enforced (developers ran `pytest tests/live -q` + `pre_flight.py`
# locally before pushing) — meaning a regression in classify_tier, a stale
# alias, or a malformed key_players_2026.json could land on origin/main and
# deploy to Vercel without anything red surfacing in CI.
#
# This is a CI gate, not a deploy gate: Vercel auto-deploys on push regardless
# of this workflow's status. The red X here is the forensic anchor — it tells
# the next on-call that "yes, this commit did break the local gate" without
# requiring them to bisect manually.
#
# Cheap: each suite runs in <2s, pre_flight runs in ~3s, JS syntax check is
# instant. Total wall-clock budget: ~30s including checkout + pip cache.

# 2026-07-21 wind-down: the tournament is over and the site is frozen as a
# read-only showcase. Automatic triggers (push / pull_request) are removed so
# no Actions minutes are consumed. Run this manually from the Actions tab if
# the code is ever touched again — then restore the push/PR triggers below.
#
#   push:
#     branches: [main]
#     paths-ignore:
#       - 'data/live/**'
#       - 'dashboard/predictions_live.json'
#       - 'dashboard/live_state.json'
#       - 'dashboard/live_delta.json'
#       - 'dashboard/matchday_intelligence.json'
#   pull_request:
#     branches: [main]
on:
  workflow_dispatch:

concurrency:
  group: wc26-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Determinism parity with live-matchday / matchday-intel-slow / daily-baseline.
# The stability test (tests/test_simulator_stability.py:50) also pins this for
# its subprocess; setting it at workflow level means the parent pytest process
# and any whitelist/alias-dict iteration tests see the same fixed hash seed.
env:
  PYTHONHASHSEED: '0'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      # Node is needed for the wc26-engine-gs/test_harness.mjs ground-truth
      # check + the tests/live/test_goal_grid_node.py wrapper that drives it.
      # Pin to LTS (20.x) to avoid v22 ECMAScript surprises hitting the
      # static-analysis regex matches in the harness. tests/live/_node_resolver
      # raises if node is missing under CI=true (silent skip == silent regression).
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: pip install -r requirements.txt

      - name: Live test suites (Stream B — matchday intelligence)
        # All 6 stream-B test runners share an unittest-style _summary() at
        # the bottom; running them as scripts gets us the full per-file
        # count printed in CI logs. Pytest discovery would also work but
        # the explicit invocation pins which files are gated.
        # test_status_mapping covers fetch_results.py status code mapping
        # (FT/AET/PEN → locked, others → warn) — kept in stream-B because
        # the locked-status logic feeds matchday adjustment cutoffs.
        run: |
          set -e
          python tests/live/test_injury_adjustments.py
          python tests/live/test_apply_matchday_adjustments.py
          python tests/live/test_weather_adjustments.py
          python tests/live/test_lineup_adjustments.py
          python tests/live/test_stats_proxy.py
          python tests/live/test_status_mapping.py

      - name: Knockout-stage test suites
        # As the tournament progresses past group stage, regressions in
        # decide_knockout / knockout_extraction / knockout_fixture_map
        # have NO local-only gate firing — these test files weren't part
        # of the Stream-B daily-run habit. Adding them here closes the
        # silent regression risk on the codepaths that determine which
        # teams advance + which fixture they play next.
        #
        # 36 tests total (9 + 15 + 12). test_decide_knockout imports
        # 03_simulate which pulls joblib (already in requirements.txt).
        run: |
          set -e
          python tests/live/test_decide_knockout.py
          python tests/live/test_knockout_extraction.py
          python tests/live/test_knockout_fixture_map.py

      - name: Simulator stability regression
        # Smoke-runs scripts/03_simulate.py at reduced fidelity (2 seeds ×
        # 300 sims) and asserts: (a) Σp_champion ≈ 1.0, (b) top-12 p95-p05
        # spread < 10pp, (c) top-1 in [5%, 60%] bookmaker band. Catches
        # determinism breaks (RNG re-seed regressions, parallelism leaks),
        # broken bracket plumbing, and stale model artifacts before they
        # land on origin/main. Production runs 5000×5 with ~1.63pp spread;
        # the 10pp guard scales for noise without false-negative drift.
        run: python tests/test_simulator_stability.py

      - name: Pre-flight gates
        # The 217-check whitelist + schema gate. Catches: malformed
        # key_players_2026.json, alias drift, intra-team forename overlap,
        # missing tier_1_star coverage, collision allowlist drift, etc.
        run: python scripts/pre_flight.py

      - name: Dashboard JS syntax
        # Fast structural check on dashboard/app.js — catches accidental
        # syntax breakage before the file reaches Vercel and breaks the
        # rendered dashboard.
        run: node --check dashboard/app.js

      - name: Apps Script engine coverage status
        # wc26-engine-gs/ was untracked in commit 0babea71. When the engine
        # source is present in the workspace (local dev, OR after a future
        # selective un-gitignore + commit of *.gs / *.mjs / *.md), the gates
        # below activate. In default CI checkout the dir is absent → those
        # gates skip via hashFiles() guards and we log a visible warning.
        # This is intentional: the gates are wired for the day they can run,
        # without forcing wc26-engine-gs/ to be tracked unilaterally.
        run: |
          if [ -f "wc26-engine-gs/test_harness.mjs" ]; then
            echo "Apps Script engine harness found — .gs regression gates ACTIVE."
          else
            echo "::warning title=.gs gates skipped::wc26-engine-gs/ is gitignored — Apps Script regression gates are not active in this CI run. To activate, selectively un-gitignore wc26-engine-gs/*.gs + *.mjs and commit (see audit memo)."
          fi

      - name: Apps Script engine harness (.gs ground truth — 135 assertions)
        if: hashFiles('wc26-engine-gs/test_harness.mjs') != ''
        # wc26-engine-gs/test_harness.mjs is the static-analysis battery for
        # the GAS source-of-truth file. It covers every v2.3.6..v2.3.13
        # regression anchor (positive + negative invariants), formula paren
        # balance, setup-time invariants, XLSX mirror cross-check. Failing
        # here means a betting-engine change broke a documented invariant —
        # NOT something to merge unreviewed. Pre-CI this ran manually only.
        run: node wc26-engine-gs/test_harness.mjs

      - name: Goal grid pinned-number suites (Python + Node-driven)
        if: hashFiles('wc26-engine-gs/test_harness.mjs') != ''
        # test_goal_grid.py: Python-replica of _buildScoreMatrix_ pinned to
        # 1e-9 at λ=(1.8,0.9), (0.9,1.8), (1.4,1.4) — catches sign / home-away
        # swaps in the Python copy.
        # test_goal_grid_node.py: drives the REAL .gs engine via Node and
        # pins it to the SAME numbers — closes the circularity gap (replica
        # could be wrong in the same way as the source and still pass).
        # _node_resolver raises if node missing under CI=true; setup-node
        # above guarantees the resolver hits PATH.
        run: python -m pytest tests/live/test_goal_grid.py tests/live/test_goal_grid_node.py -v

      - name: Goal-grid vs predictions feed agreement (CI-mode soft gate)
        # Compares the .gs Poisson+DC grid against the production sim's
        # WDL probabilities (which use NB marginals). Expected systematic
        # gap is ~5-6% (NB-vs-Poisson). --ci-mode escalates to exit 1 only
        # if max gap exceeds 10% — a real regression class (sign flip,
        # stale max_g, τ break). The default 2.5% / 1% buckets stay
        # informational so ops doesn't see CI red on the documented gap.
        run: python scripts/live/verify_goal_grid_agreement.py --ci-mode
